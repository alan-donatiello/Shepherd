<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shepard</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:#fff;color:#1e293b}
  .mono{font-family:'Cascadia Code','Fira Code',Consolas,monospace}
  .header{border-bottom:1px solid #e2e8f0;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center}
  .logo-name{font-size:15px;font-weight:600;color:#0f172a}
  .demo-badge{font-size:10px;color:#94a3b8;padding:2px 7px;border:1px solid #e2e8f0;border-radius:3px;margin-left:6px;text-transform:uppercase;letter-spacing:.05em}
  .screen{display:none}.screen.active{display:block}
  .container{max-width:1200px;margin:0 auto;padding:24px 28px}

  /* ===== SCREEN 1: WALLET CONFIG ===== */
  .wc-center{max-width:640px;margin:60px auto}
  .wc-title{font-size:22px;font-weight:600;color:#0f172a;margin-bottom:4px}
  .wc-sub{font-size:13px;color:#64748b;margin-bottom:32px}
  .wc-field{margin-bottom:16px}
  .wc-field label{display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .wc-field input{width:100%;font-size:13px;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;outline:none;color:#1e293b;background:#fff;transition:border-color .15s}
  .wc-field input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
  .wc-field input.mono{font-family:'Cascadia Code','Fira Code',Consolas,monospace;font-size:12px}
  .wc-row2{display:grid;grid-template-columns:1fr 120px;gap:12px}
  .wc-actions{display:flex;gap:10px;margin-top:20px}
  .btn{font-size:13px;font-weight:600;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .15s}
  .btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb}
  .btn-primary:disabled{background:#93c5fd;cursor:wait}
  .btn-secondary{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}.btn-secondary:hover{background:#e2e8f0}
  .btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}

  .wc-progress{margin-top:20px;display:none}
  .wc-progress.active{display:block}
  .prog-track{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#7c3aed);border-radius:3px;transition:width .3s;width:0%}
  .prog-text{font-size:12px;color:#64748b;margin-top:6px}

  .wc-result{margin-top:24px;padding:20px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;display:none}
  .wc-result.active{display:block}
  .wc-result h4{font-size:14px;color:#166534;margin-bottom:8px}
  .wc-result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .wc-result-item{font-size:12px;color:#475569}.wc-result-item strong{color:#166534;font-size:16px;display:block;margin-top:2px}

  .wc-saved-section{margin-top:32px;border-top:1px solid #e2e8f0;padding-top:24px}
  .wc-saved-title{font-size:13px;font-weight:600;color:#334155;margin-bottom:12px}
  .wc-chips{display:flex;gap:8px;flex-wrap:wrap}
  .wc-chip{font-size:12px;padding:8px 14px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
  .wc-chip:hover{border-color:#3b82f6;background:#eff6ff}
  .wc-chip .cn{color:#334155;font-weight:500}.wc-chip .ca{color:#94a3b8;font-size:11px}
  .wc-chip .cx{color:#cbd5e1;font-size:14px;margin-left:4px;cursor:pointer}.wc-chip .cx:hover{color:#ef4444}
  .wc-empty{font-size:12px;color:#94a3b8;font-style:italic}

  /* ===== SCREEN 2: LEDGER ===== */
  .back-btn{font-size:12px;color:#3b82f6;cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:16px;font-weight:500}
  .back-btn:hover{color:#2563eb}

  .summary-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
  .sc{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px}
  .sc-label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .sc-value{font-size:18px;font-weight:600}.sc-sub{font-size:10px;color:#94a3b8;margin-top:2px}

  .tx-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .tx-nav-controls{display:flex;align-items:center;gap:8px}
  .nav-btn{width:32px;height:32px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;color:#475569;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
  .nav-btn:hover{background:#f1f5f9}.nav-btn:disabled{opacity:.3;cursor:default}
  .tx-counter{font-size:12px;color:#64748b;min-width:70px;text-align:center}.tx-counter strong{color:#1e293b}
  .gl-classify{display:flex;align-items:center;gap:8px}
  .gl-classify label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
  .gl-select{font-size:12px;padding:6px 10px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;color:#1e293b;cursor:pointer;outline:none;min-width:200px}
  .gl-select:focus{border-color:#3b82f6}.gl-select.mapped{border-color:#86efac;background:#f0fdf4}

  .tx-detail{display:flex;align-items:center;gap:14px;padding:12px 16px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:20px;flex-wrap:wrap}
  .tx-dir{font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px}
  .tx-dir.in{background:#dcfce7;color:#166534}.tx-dir.out{background:#fff7ed;color:#9a3412}
  .tx-amt{font-size:17px;font-weight:600}.tx-amt.in{color:#16a34a}.tx-amt.out{color:#ea580c}
  .tx-cp{font-size:12px;color:#64748b;flex:1}.tx-cp strong{color:#334155;font-weight:500}
  .tx-meta{font-size:11px;color:#94a3b8}

  .main-grid{display:grid;grid-template-columns:360px 1fr;gap:0;position:relative}
  .panel-title{font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}

  .journal-panel{padding-right:24px}
  .journal-card{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
  .j-hdr{display:grid;grid-template-columns:28px 1fr 76px 76px;padding:7px 12px;background:#f8fafc;font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0}
  .j-hdr>div:nth-child(3),.j-hdr>div:nth-child(4){text-align:right}
  .j-line{display:grid;grid-template-columns:28px 1fr 76px 76px;padding:9px 12px;font-size:11px;border-bottom:1px solid #f1f5f9;position:relative}
  .j-line:last-child{border-bottom:none}
  .j-line>div:nth-child(1){color:#94a3b8;font-size:10px}
  .j-line>div:nth-child(2){color:#334155;line-height:1.4;font-size:10.5px}
  .j-line>div:nth-child(3),.j-line>div:nth-child(4){text-align:right}
  .j-line .dr{color:#1e293b;font-weight:500}.j-line .cr{color:#1e293b;font-weight:500}.j-line .zero{color:#cbd5e1}
  .j-line .dot{position:absolute;right:-16px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;border:2px solid}
  .j-total{display:grid;grid-template-columns:28px 1fr 76px 76px;padding:8px 12px;font-size:11px;font-weight:600;border-top:2px solid #e2e8f0;background:#f8fafc}
  .j-total>div:nth-child(3),.j-total>div:nth-child(4){text-align:right;color:#16a34a}
  .j-balanced{font-size:10px;color:#16a34a;margin-top:6px}

  .fs-panel{padding-left:24px;border-left:1px solid #e2e8f0}
  .fs-stack{display:flex;flex-direction:column;gap:14px}
  .fs-card{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
  .fs-card-title{font-size:11px;font-weight:600;padding:9px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0;color:#334155;display:flex;justify-content:space-between}
  .fs-card-title .sub{font-weight:400;color:#94a3b8;font-size:10px}
  .fs-hdr{display:grid;grid-template-columns:1fr 82px 82px;padding:5px 12px;font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;background:#fafbfc;border-bottom:1px solid #f1f5f9}
  .fs-hdr>div:nth-child(2),.fs-hdr>div:nth-child(3){text-align:right}
  .fs-line{display:grid;grid-template-columns:1fr 82px 82px;padding:6px 12px;font-size:11px;color:#475569;border-bottom:1px solid #f8fafc;position:relative;transition:background .3s}
  .fs-line>div:nth-child(2),.fs-line>div:nth-child(3){text-align:right}
  .fs-line.section{font-weight:600;color:#334155;background:#f8fafc;font-size:10px;text-transform:uppercase;letter-spacing:.04em;padding:7px 12px}
  .fs-line.indent{padding-left:22px}
  .fs-line.subtotal{font-weight:600;color:#1e293b;border-top:1px solid #e2e8f0}
  .fs-line.total{font-weight:700;color:#0f172a;border-top:2px solid #cbd5e1;background:#f8fafc;padding:8px 12px}
  .fs-line.hit{background:#eff6ff}
  .fs-line.hit::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0}
  .fs-line .chg{font-weight:600}.fs-line .chg.pos{color:#16a34a}.fs-line .chg.neg{color:#ea580c}.fs-line .chg.zero{color:#cbd5e1}
  .fs-check{padding:6px 12px;font-size:10px;border-top:1px solid #e2e8f0;color:#16a34a}

  #arrowSvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
  #arrowSvg path{fill:none;stroke-width:1.5;opacity:.6}
</style>
</head>

<!-- ===== SCREEN 1: WALLET CONFIG ===== -->
<div class="screen active" id="screen-config">
  <div class="wc-center">
    <div class="wc-title">Wallet Scanner</div>
    <div class="wc-sub">Scan any Base or Solana wallet for USDC transfers and generate journal entries.</div>

    <div class="wc-field">
      <label>Wallet Address</label>
      <input class="mono" id="walletInput" placeholder="0x..." spellcheck="false">
    </div>
    <div class="wc-row2">
      <div class="wc-field">
        <label>Label</label>
        <input id="nameInput" placeholder="e.g. Treasury, Payroll, Revenue">
      </div>
      <div class="wc-field">
        <label>Lookback Blocks</label>
        <input id="blocksInput" type="number" value="1000" min="100" max="100000">
      </div>
    </div>

    <div class="wc-actions">
      <button class="btn btn-primary" id="scanBtn" onclick="startScan()">Scan Wallet</button>
      <button class="btn btn-secondary" onclick="saveWallet()">Save Without Scanning</button>
    </div>

    <div class="wc-progress" id="progressBar">
      <div class="prog-track"><div class="prog-fill" id="progressFill"></div></div>
      <div class="prog-text" id="progressText">Connecting to Base...</div>
    </div>

    <div class="wc-result" id="scanResult">
      <h4>Scan Complete</h4>
      <div class="wc-result-grid" id="resultGrid"></div>
      <button class="btn btn-success" onclick="openLedger()">Open Ledger &#8594;</button>
    </div>

    <div class="wc-saved-section">
      <div class="wc-saved-title">Saved Wallets</div>
      <div class="wc-chips" id="savedWallets"><div class="wc-empty">No wallets saved yet</div></div>
    </div>
  </div>
</div>

<!-- ===== SCREEN 2: LEDGER ===== -->
<div class="screen" id="screen-ledger">
  <div class="container">
    <div class="back-btn" onclick="showConfig()">&#8592; Back to Wallets</div>
    <div class="summary-cards" id="summaryCards"></div>
    <div id="classifyNotice" style="display:none;font-size:12px;color:#16a34a;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:8px 14px;margin-bottom:16px;font-weight:500"></div>
    <div class="tx-nav">
      <div class="tx-nav-controls">
        <button class="nav-btn" id="prevBtn" onclick="nav(-1)">&#8592;</button>
        <div class="tx-counter" id="txCounter"></div>
        <button class="nav-btn" id="nextBtn" onclick="nav(1)">&#8594;</button>
      </div>
      <div class="gl-classify">
        <label>Classify:</label>
        <select class="gl-select" id="glSelect" onchange="classify(this.value)"></select>
      </div>

<script>
// ============ CONFIG ============
const GL_OPTIONS=["Unclassified","6110 - Payroll","6200 - Software & SaaS","6300 - Cloud Infrastructure","6420 - Marketing & Ads","6500 - Professional Services","6600 - Office & Operations","7100 - Intercompany Transfer","4100 - Revenue - Services","4200 - Revenue - Product","4300 - Customer Refund","1200 - Treasury Rebalance"];
const COLORS=["#3b82f6","#8b5cf6","#06b6d4","#f59e0b"];
const GL_MAP={"6110":"pnl-payroll","6200":"pnl-software","6300":"pnl-cloud","6420":"pnl-marketing","6500":"pnl-profsvc","6600":"pnl-ops","4100":"pnl-revsvc","4200":"pnl-revprod","4300":"pnl-revsvc","7100":"bs-usdc","1200":"bs-usdc"};
const OPENING={revSvc:1450000,revProd:380000,expPay:620000,expSw:85000,expCloud:142000,expMkt:215000,expProf:67000,expOps:38000,expGas:1.80,cash:2450000,usdc:1800000,eth:12500,ar:340000,ap:285000,accrued:125000,equity:3500000,re:692500};

let wallets=[],scanData=null,txs=[],idx=0,mappings={};
const fmt=n=>Math.abs(n)<.01&&n!==0?n.toFixed(4):n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtShort=n=>{if(Math.abs(n)>=1e6)return"$"+(n/1e6).toFixed(1)+"M";if(Math.abs(n)>=1e3)return"$"+(n/1e3).toFixed(1)+"K";return"$"+fmt(n)};
const addr=a=>(a&&a.length>=10)?a.slice(0,6)+"..."+a.slice(-4):a;
const glOf=h=>mappings[h]||"Unclassified";
const pfx=g=>g.split(" - ")[0];

// ============ SCREEN MANAGEMENT ============
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById("screen-"+id).classList.add("active");}
function showConfig(){showScreen("config");}
function openLedger(){if(!txs.length)return;idx=0;showScreen("ledger");renderLedger();}

// ============ WALLET MANAGEMENT ============
function saveWallet(){
  const a=document.getElementById("walletInput").value.trim();
  const n=document.getElementById("nameInput").value.trim()||addr(a);
  if(!a.startsWith("0x")&&a.length<32||a.startsWith("0x")&&a.length!==42)return alert("Enter a valid wallet address (0x... for Base, or Solana address)");
  if(!wallets.find(w=>w.addr.toLowerCase()===a.toLowerCase())){wallets.push({addr:a,name:n});}
  renderWallets();
}
function loadWallet(i){
  document.getElementById("walletInput").value=wallets[i].addr;
  document.getElementById("nameInput").value=wallets[i].name;
  renderWallets();
}
function removeWallet(i,e){e.stopPropagation();wallets.splice(i,1);renderWallets();}
function renderWallets(){
  const el=document.getElementById("savedWallets");
  if(!wallets.length){el.innerHTML='<div class="wc-empty">No wallets saved yet</div>';return;}
  el.innerHTML=wallets.map((w,i)=>`<div class="wc-chip" onclick="loadWallet(${i})">
    <span class="cn">${w.name}</span><span class="ca mono">${addr(w.addr)}</span>
    <span class="cx" onclick="removeWallet(${i},event)">&times;</span></div>`).join("");
}

// ============ SCANNING ============
async function startScan(){
  const wallet=document.getElementById("walletInput").value.trim();
  const blocks=parseInt(document.getElementById("blocksInput").value)||1000;
  if(!wallet.startsWith("0x")&&wallet.length<32||wallet.startsWith("0x")&&wallet.length!==42)return alert("Enter a valid wallet address (0x... for Base, or Solana address)");

  saveWallet();
  const btn=document.getElementById("scanBtn");
  btn.disabled=true;btn.textContent="Scanning...";
  const pb=document.getElementById("progressBar");pb.classList.add("active");
  document.getElementById("progressFill").style.width="5%";
  document.getElementById("progressFill").style.background="";
  document.getElementById("progressText").textContent="Connecting to Base...";
  document.getElementById("scanResult").classList.remove("active");

  try{
    const res=await fetch("/api/scan",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({wallet,lookback_blocks:blocks})});
    const data=await res.json();
    if(data.error)throw new Error(data.error);

    const poll=setInterval(async()=>{
      try{
        const pr=await fetch("/api/progress");const p=await pr.json();
        if(p.progress&&p.progress.phase){
          document.getElementById("progressFill").style.width=p.progress.pct+"%";
          document.getElementById("progressText").textContent=`${p.progress.phase}... ${p.progress.pct}% (${p.progress.found} transfers found)`;
        }
        if(!p.running){
          clearInterval(poll);
          const rr=await fetch("/api/result");const result=await rr.json();
          if(result.error)throw new Error(result.error);
          onScanComplete(result);
        }
      }catch(e){clearInterval(poll);onScanError(e.message);}
    },500);
  }catch(e){onScanError(e.message);}
}

function onScanComplete(report){
  document.getElementById("scanBtn").disabled=false;
  document.getElementById("scanBtn").textContent="Scan Wallet";
  document.getElementById("progressBar").classList.remove("active");

  scanData=report;
  txs=report.journals.map(j=>({
    hash:j.tx_hash,
    block:j.block_number,
    dir:j.direction,
    amount:j.amount,
    cp:j.counterparty,
    gas:j.gas_usd||0
  }));
  mappings={};

  const s=report.summary;
  document.getElementById("resultGrid").innerHTML=`
    <div class="wc-result-item">Transfers<strong>${s.transfer_count}</strong></div>

// ============ LEDGER SCREEN ============
function uncIdxs(){return txs.map((t,i)=>({i,t})).filter(x=>glOf(x.t.hash)==="Unclassified").map(x=>x.i);}
function nav(d){
  const unc=uncIdxs();
  if(!unc.length)return;
  const curPos=unc.indexOf(idx);
  if(curPos===-1){idx=unc[0];} // current is classified, jump to first unclassified
  else{const next=curPos+d;idx=unc[Math.max(0,Math.min(unc.length-1,next))];}
  renderTx();
}
let cpMappings={};
function classify(v){
  const tx=txs[idx];
  mappings[tx.hash]=v;
  if(v!=="Unclassified"){
    cpMappings[tx.cp]=v;
    let autoCount=0;
    txs.forEach(t=>{if(t.cp===tx.cp&&t.hash!==tx.hash){mappings[t.hash]=v;autoCount++;}});
    if(autoCount>0){
      const note=document.getElementById("classifyNotice");
      if(note){note.textContent="Auto-classified "+autoCount+" more transaction"+(autoCount>1?"s":"")+" from this counterparty";note.style.display="block";
        setTimeout(()=>{note.style.display="none";},4000);}
    }
    // Advance to next unclassified
    const unc=uncIdxs();
    if(unc.length>0){const nextAfter=unc.find(i=>i>idx);idx=nextAfter!==undefined?nextAfter:unc[0];}
  } else {
    const oldCp=tx.cp;delete cpMappings[oldCp];
    txs.forEach(t=>{if(t.cp===oldCp)delete mappings[t.hash];});
  }
  renderLedger();
}

function getTarget(g,fallback){
  if(g==="Unclassified")return fallback==="expense"?"pnl-unclass-out":"pnl-unclass-in";
  const p=pfx(g);return GL_MAP[p]||(fallback==="expense"?"pnl-unclass-out":"pnl-unclass-in");
}

function getJournal(tx){
  const g=glOf(tx.hash),label=g==="Unclassified"?(tx.dir==="outflow"?"AP / Expense (unclassified)":"AR / Revenue (unclassified)"):g;
  if(tx.dir==="outflow"){
    const l=[{n:1,acct:label,dr:tx.amount,cr:0,t:getTarget(g,"expense")},{n:2,acct:"Digital Asset - USDC",dr:0,cr:tx.amount,t:"bs-usdc"}];
    if(tx.gas>0){l.push({n:3,acct:"Expense - Network Fees",dr:tx.gas,cr:0,t:"pnl-gas"});l.push({n:4,acct:"Digital Asset - ETH",dr:0,cr:tx.gas,t:"bs-eth"});}
    return l;
  }
  return[{n:1,acct:"Digital Asset - USDC",dr:tx.amount,cr:0,t:"bs-usdc"},{n:2,acct:label,dr:0,cr:tx.amount,t:getTarget(g,"revenue")}];
}

function computeTotals(){
  const o=OPENING;let im={revSvc:0,revProd:0,expPay:0,expSw:0,expCloud:0,expMkt:0,expProf:0,expOps:0,expGas:0,usdcChg:0,ethChg:0,uncIn:0,uncOut:0,classified:0};
  txs.forEach(tx=>{const g=glOf(tx.hash),p=pfx(g);im.expGas+=tx.gas;
    if(g==="Unclassified"){if(tx.dir==="inflow")im.uncIn+=tx.amount;else im.uncOut+=tx.amount;}
    else{im.classified++;if(p==="4100")im.revSvc+=tx.amount;else if(p==="4200")im.revProd+=tx.amount;
      else if(p==="6110")im.expPay+=tx.amount;else if(p==="6200")im.expSw+=tx.amount;else if(p==="6300")im.expCloud+=tx.amount;
      else if(p==="6420")im.expMkt+=tx.amount;else if(p==="6500")im.expProf+=tx.amount;else if(p==="6600")im.expOps+=tx.amount;}
    if(tx.dir==="inflow")im.usdcChg+=tx.amount;else{im.usdcChg-=tx.amount;im.ethChg-=tx.gas;}
  });
  const totRev=(o.revSvc+im.revSvc)+(o.revProd+im.revProd)+im.uncIn;
  const totExp=(o.expPay+im.expPay)+(o.expSw+im.expSw)+(o.expCloud+im.expCloud)+(o.expMkt+im.expMkt)+(o.expProf+im.expProf)+(o.expOps+im.expOps)+(o.expGas+im.expGas)+im.uncOut;
  return{im,totRev,totExp,ni:totRev-totExp,cUsdc:o.usdc+im.usdcChg,cEth:o.eth+im.ethChg};
}

          ${im.expOps>0?`<div style="padding:7px 18px 7px 28px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 90px 90px;border-bottom:1px solid #f8fafc"><div>6600 Operations</div><div style="text-align:right">$${fmt(o.expOps)}</div><div style="text-align:right">${fmtChg(im.expOps,true)}</div></div>`:''}
          ${im.expGas>0.001?`<div style="padding:7px 18px 7px 28px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 90px 90px;border-bottom:1px solid #f8fafc"><div>Network Fees</div><div style="text-align:right">$${fmt(o.expGas)}</div><div style="text-align:right">${fmtChg(im.expGas,true)}</div></div>`:''}
          <div style="padding:8px 18px;font-size:12px;font-weight:600;color:#1e293b;display:grid;grid-template-columns:1fr 90px 90px;border-top:1px solid #e2e8f0">
            <div>Total Expenses</div><div style="text-align:right">($${fmt(o.expPay+o.expSw+o.expCloud+o.expMkt+o.expProf+o.expOps+o.expGas)})</div><div style="text-align:right">${fmtChg(totExp-(o.expPay+o.expSw+o.expCloud+o.expMkt+o.expProf+o.expOps+o.expGas),true)}</div>
          </div>

          <div style="padding:10px 18px;font-size:13px;font-weight:700;color:${ni>=0?'#16a34a':'#ea580c'};display:grid;grid-template-columns:1fr 180px;border-top:2px solid #cbd5e1;background:#f8fafc">
            <div>Net Income</div><div style="text-align:right">$${fmt(ni)}</div>
          </div>
        </div>
      </div>

      <div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
        <div style="font-size:13px;font-weight:600;padding:12px 18px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between">
          <span>Balance Sheet</span><span style="font-size:11px;color:#94a3b8;font-weight:400">Closing</span>
        </div>
        <div style="padding:0">
          <div style="padding:8px 18px;font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;display:grid;grid-template-columns:1fr 90px 90px;background:#fafbfc;border-bottom:1px solid #f1f5f9">
            <div>Account</div><div style="text-align:right">Opening</div><div style="text-align:right">Closing</div>
          </div>
          <div style="padding:8px 18px;font-size:10px;font-weight:600;color:#334155;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #e2e8f0">Assets</div>
          <div style="padding:7px 18px 7px 28px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 90px 90px;border-bottom:1px solid #f8fafc"><div>Cash (USD)</div><div style="text-align:right">$${fmt(o.cash)}</div><div style="text-align:right">$${fmt(o.cash)}</div></div>
          <div style="padding:7px 18px 7px 28px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 90px 90px;border-bottom:1px solid #f8fafc"><div>USDC</div><div style="text-align:right">$${fmt(o.usdc)}</div><div style="text-align:right;font-weight:600;color:${im.usdcChg>=0?'#16a34a':'#ea580c'}">$${fmt(closingUsdc)}</div></div>
          <div style="padding:7px 18px 7px 28px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 90px 90px;border-bottom:1px solid #f8fafc"><div>ETH / SOL (gas)</div><div style="text-align:right">$${fmt(o.eth)}</div><div style="text-align:right">$${fmt(closingEth)}</div></div>
          <div style="padding:7px 18px 7px 28px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 90px 90px;border-bottom:1px solid #f8fafc"><div>Accounts Receivable</div><div style="text-align:right">$${fmt(o.ar)}</div><div style="text-align:right">$${fmt(o.ar)}</div></div>
          <div style="padding:8px 18px;font-size:12px;font-weight:600;color:#1e293b;display:grid;grid-template-columns:1fr 90px 90px;border-top:1px solid #e2e8f0">
            <div>Total Assets</div><div style="text-align:right">$${fmt(o.cash+o.usdc+o.eth+o.ar)}</div><div style="text-align:right;font-weight:700">$${fmt(totalAssets)}</div>
          </div>

          <div style="padding:8px 18px;font-size:10px;font-weight:600;color:#334155;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #e2e8f0;border-top:1px solid #e2e8f0">Liabilities & Equity</div>
          <div style="padding:7px 18px 7px 28px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 90px 90px;border-bottom:1px solid #f8fafc"><div>Accounts Payable</div><div style="text-align:right">$${fmt(o.ap)}</div><div style="text-align:right">$${fmt(o.ap)}</div></div>
          <div style="padding:7px 18px 7px 28px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 90px 90px;border-bottom:1px solid #f8fafc"><div>Accrued Liabilities</div><div style="text-align:right">$${fmt(o.accrued)}</div><div style="text-align:right">$${fmt(o.accrued)}</div></div>
          <div style="padding:7px 18px 7px 28px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 90px 90px;border-bottom:1px solid #f8fafc"><div>Common Stock</div><div style="text-align:right">$${fmt(o.equity)}</div><div style="text-align:right">$${fmt(o.equity)}</div></div>
          <div style="padding:7px 18px 7px 28px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 90px 90px;border-bottom:1px solid #f8fafc"><div>Retained Earnings</div><div style="text-align:right">$${fmt(o.re)}</div><div style="text-align:right;font-weight:600;color:${ni>=0?'#16a34a':'#ea580c'}">$${fmt(closingRE)}</div></div>
          <div style="padding:8px 18px;font-size:12px;font-weight:600;color:#1e293b;display:grid;grid-template-columns:1fr 90px 90px;border-top:1px solid #e2e8f0">
            <div>Total L + E</div><div style="text-align:right">$${fmt(o.ap+o.accrued+o.equity+o.re)}</div><div style="text-align:right;font-weight:700">$${fmt(totalLE)}</div>
          </div>

          <div style="padding:10px 18px;font-size:12px;border-top:2px solid #cbd5e1;background:${balanced?'#f0fdf4':'#fef2f2'};color:${balanced?'#166534':'#991b1b'};font-weight:600">
            ${balanced?'A = L + E: Balanced':'A ≠ L + E: Out of balance by $'+fmt(Math.abs(totalAssets-totalLE))}
          </div>
        </div>
      </div>
    </div>

    <div style="margin-top:20px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
      <div style="font-size:13px;font-weight:600;padding:12px 18px;background:#f8fafc;border-bottom:1px solid #e2e8f0">Wallet Reconciliation</div>
      <div style="padding:12px 18px;font-size:12px;color:#475569;display:grid;grid-template-columns:1fr 140px;gap:4px">
        <div>Opening USDC Balance</div><div style="text-align:right">$${fmt(o.usdc)}</div>
        <div>USDC Inflows (${s.inflow_count} transfers)</div><div style="text-align:right;color:#16a34a">+$${fmt(s.total_usdc_in)}</div>
        <div>USDC Outflows (${s.outflow_count} transfers)</div><div style="text-align:right;color:#ea580c">-$${fmt(s.total_usdc_out)}</div>
        <div style="border-top:1px solid #e2e8f0;padding-top:6px;font-weight:600;color:#1e293b">Closing USDC Balance</div><div style="text-align:right;border-top:1px solid #e2e8f0;padding-top:6px;font-weight:700;color:#1e293b">$${fmt(closingUsdc)}</div>
        <div style="padding-top:4px">Net Change</div><div style="text-align:right;padding-top:4px;font-weight:600;color:${im.usdcChg>=0?'#16a34a':'#ea580c'}">${im.usdcChg>=0?'+':''}$${fmt(im.usdcChg)}</div>
        <div>Gas Consumed (ETH/SOL)</div><div style="text-align:right;color:#ea580c">-$${fmt(Math.abs(im.ethChg))}</div>
      </div>
      <div style="padding:10px 18px;font-size:12px;border-top:1px solid #e2e8f0;background:#f0fdf4;color:#166534;font-weight:600">
        On-chain activity fully reconciled to general ledger
      </div>
    </div>
  `;
}

function drawArrows(){
  const svg=document.getElementById("arrowSvg"),grid=document.getElementById("mainGrid");
  if(!svg||!grid||!txs.length)return;
  const gr=grid.getBoundingClientRect();
  svg.setAttribute("width",gr.width);svg.setAttribute("height",gr.height);svg.innerHTML="";
  const journal=getJournal(txs[idx]);
  journal.forEach((line,i)=>{
    const src=document.getElementById("jl-"+i),tgt=document.getElementById("fs-"+line.t);
    if(!src||!tgt||!tgt.offsetHeight)return;
    const sr=src.getBoundingClientRect(),tr=tgt.getBoundingClientRect();
    const x1=sr.right-gr.left+4,y1=sr.top-gr.top+sr.height/2;
    const x2=tr.left-gr.left-2,y2=tr.top-gr.top+tr.height/2;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M${x1},${y1} C${x1+(x2-x1)*.4},${y1} ${x1+(x2-x1)*.6},${y2} ${x2},${y2}`);
    path.setAttribute("stroke",COLORS[i%4]);svg.appendChild(path);
    const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",x2);c.setAttribute("cy",y2);c.setAttribute("r","3");
    c.setAttribute("fill",COLORS[i%4]);c.setAttribute("opacity",".6");svg.appendChild(c);
  });
}
window.addEventListener("resize",()=>requestAnimationFrame(drawArrows));
</script>
</body>
</html>
